<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S17 — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #08081a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .phone {
      width: 340px; height: 736px;
      border-radius: 36px; position: relative; overflow: hidden;
      background: #0d0d1f;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12),
        0 0 0 2.5px rgba(0,0,0,0.8),
        0 48px 96px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .notch {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 90px; height: 24px; background: #000;
      border-radius: 0 0 16px 16px; z-index: 20;
    }
    .status {
      position: absolute; top: 0; left: 0; right: 0; height: 44px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 0; z-index: 10;
    }
    .status-time { font-family: 'Space Grotesk',sans-serif; font-size: 13px; font-weight: 600; color: #fff; }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .battery {
      width: 22px; height: 10px;
      border: 1.5px solid rgba(255,255,255,0.45); border-radius: 2.5px;
      padding: 1.5px; position: relative; display: flex; align-items: center;
    }
    .battery::after {
      content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
      width: 2.5px; height: 5px; background: rgba(255,255,255,0.45);
      border-radius: 0 1.5px 1.5px 0;
    }
    .battery-fill { width: 65%; height: 100%; background: #3DD68C; border-radius: 1px; }
    .body {
      position: absolute;
      top: 44px; left: 0; right: 0; bottom: 72px;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none;
      padding: 0 18px;
    }
    .body::-webkit-scrollbar { display: none; }
    .tabbar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 72px;
      background: rgba(8,10,24,0.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 8px 12px; z-index: 20;
    }
    .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; color: rgba(255,255,255,0.28); padding: 6px 12px; border-radius: 12px; }
    .tab--on { color: #5B8FFF; background: rgba(91,143,255,0.12); border-radius: 14px; padding: 6px 16px; }
    .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.8; }
    .row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .row:first-child { border-radius: 13px 13px 0 0; }
    .row:last-child { border-radius: 0 0 13px 13px; border-bottom: none; }
    .row-only { border-radius: 13px; border-bottom: none; }
  </style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <!-- Status bar -->
  <div class="status">
    <div class="status-time">4:52</div>
    <div class="status-icons">
      <svg width="30" height="10" viewBox="0 0 30 10" fill="none">
        <rect x="0" y="6" width="2.5" height="4" rx="0.4" fill="rgba(255,255,255,0.75)"/>
        <rect x="3.8" y="3.5" width="2.5" height="6.5" rx="0.4" fill="rgba(255,255,255,0.75)"/>
        <rect x="7.6" y="1.5" width="2.5" height="8.5" rx="0.4" fill="rgba(255,255,255,0.55)"/>
        <rect x="11.4" y="0" width="2.5" height="10" rx="0.4" fill="rgba(255,255,255,0.38)"/>
        <circle cx="23" cy="9" r="1.2" fill="rgba(255,255,255,0.7)"/>
        <path d="M20.2 6.5a3.8 3.8 0 015.6 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M17.8 4a7.2 7.2 0 0110.4 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div class="battery"><div class="battery-fill"></div></div>
    </div>
  </div>

  <div class="body">

    <!-- ① Avatar + name block -->
    <div style="display:flex;flex-direction:column;align-items:center;padding:20px 0 22px;">
      <div style="position:relative;margin-bottom:12px;">
        <div style="width:74px;height:74px;border-radius:50%;overflow:hidden;border:2.5px solid rgba(91,143,255,0.45);">
          <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=200&h=200&fit=crop&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" />
        </div>
        <!-- Edit badge -->
        <div style="position:absolute;bottom:0;right:0;width:22px;height:22px;border-radius:50%;background:#5B8FFF;border:2px solid #0d0d1f;display:flex;align-items:center;justify-content:center;">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1.5 8l1.5-1.5 4.5-4.5 1.5 1.5-4.5 4.5L1.5 9.5V8z" fill="#fff"/>
          </svg>
        </div>
      </div>
      <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;">Emily Carter</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.38);margin-top:2px;">emily@example.com</div>
      <!-- HIPAA badge -->
      <div style="margin-top:10px;display:flex;align-items:center;gap:5px;padding:4px 11px;background:rgba(61,214,140,0.08);border:1px solid rgba(61,214,140,0.2);border-radius:100px;">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M5 1L1.5 2.5v3C1.5 7.5 3 9 5 9.5 7 9 8.5 7.5 8.5 5.5v-3L5 1z" stroke="rgba(61,214,140,0.7)" stroke-width="1" fill="rgba(61,214,140,0.15)"/>
        </svg>
        <span style="font-size:10px;font-weight:600;color:rgba(61,214,140,0.7);">HIPAA Protected</span>
      </div>
    </div>

    <!-- ② Health snapshot stats -->
    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <div style="flex:1;background:rgba(91,143,255,0.08);border:1px solid rgba(91,143,255,0.16);border-radius:13px;padding:11px;text-align:center;">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;">8</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.38);margin-top:2px;">Total Visits</div>
      </div>
      <div style="flex:1;background:rgba(61,214,140,0.08);border:1px solid rgba(61,214,140,0.16);border-radius:13px;padding:11px;text-align:center;">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;">3</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.38);margin-top:2px;">Doctors</div>
      </div>
      <div style="flex:1;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.16);border-radius:13px;padding:11px;text-align:center;">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;">4.8</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.38);margin-top:2px;">Avg Rating</div>
      </div>
    </div>

    <!-- ③ Personal Info section -->
    <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Personal Info</div>
    <div style="border:1px solid rgba(255,255,255,0.07);border-radius:13px;overflow:hidden;margin-bottom:18px;">
      <div class="row">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="5" r="3" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/><path d="M2 13c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-linecap="round"/></svg>
          <span style="font-size:13px;color:rgba(255,255,255,0.45);">Full Name</span>
        </div>
        <span style="font-size:13px;color:rgba(255,255,255,0.75);font-weight:500;">Emily Carter</span>
      </div>
      <div class="row">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="2" width="13" height="11" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/><path d="M1 5.5h13" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/></svg>
          <span style="font-size:13px;color:rgba(255,255,255,0.45);">Date of Birth</span>
        </div>
        <span style="font-size:13px;color:rgba(255,255,255,0.75);font-weight:500;">14 Apr 1994</span>
      </div>
      <div class="row">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 3h11a1 1 0 011 1v5a1 1 0 01-1 1H5l-3 3V4a1 1 0 011-1z" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span style="font-size:13px;color:rgba(255,255,255,0.45);">Email</span>
        </div>
        <span style="font-size:13px;color:rgba(255,255,255,0.75);font-weight:500;">emily@example.com</span>
      </div>
      <div class="row" style="border-radius:0 0 13px 13px;border-bottom:none;">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2.5 3a1 1 0 00-1 .9L1 6c1.8 5 4.5 7 6.5 7 1.8 0 4.7-2 6.5-7l-.5-2.1a1 1 0 00-1-.9H11a1 1 0 00-1 1v.5C9.5 6 8.5 7 7.5 7S5.5 6 5.5 4.5V4a1 1 0 00-1-1H2.5z" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/></svg>
          <span style="font-size:13px;color:rgba(255,255,255,0.45);">Phone</span>
        </div>
        <span style="font-size:13px;color:rgba(255,255,255,0.75);font-weight:500;">+1 (917) 555-0182</span>
      </div>
    </div>

    <!-- ④ Settings section -->
    <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Settings</div>
    <div style="border:1px solid rgba(255,255,255,0.07);border-radius:13px;overflow:hidden;margin-bottom:18px;">
      <!-- Notifications -->
      <div class="row">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1.5a5 5 0 015 5v3l1 1.5H1.5l1-1.5v-3a5 5 0 015-5z" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/><path d="M6 12.5a1.5 1.5 0 003 0" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/></svg>
          <span style="font-size:13px;color:rgba(255,255,255,0.65);">Notifications</span>
        </div>
        <!-- Toggle ON -->
        <div style="width:36px;height:20px;background:rgba(61,214,140,0.7);border-radius:100px;position:relative;">
          <div style="position:absolute;right:3px;top:3px;width:14px;height:14px;background:#fff;border-radius:50%;"></div>
        </div>
      </div>
      <!-- Insurance -->
      <div class="row">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="3" width="13" height="9" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/><path d="M1 6h13" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/><rect x="3" y="8.5" width="4" height="1" rx="0.5" fill="rgba(255,255,255,0.35)"/></svg>
          <span style="font-size:13px;color:rgba(255,255,255,0.65);">Insurance Card</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <!-- Payment methods -->
      <div class="row" style="border-radius:0 0 13px 13px;border-bottom:none;">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="3" width="13" height="9" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/><path d="M1 6h13" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/></svg>
          <span style="font-size:13px;color:rgba(255,255,255,0.65);">Payment Methods</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <!-- ⑤ Sign out -->
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.18);border-radius:13px;cursor:pointer;margin-bottom:10px;">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M5.5 2H3a1 1 0 00-1 1v9a1 1 0 001 1h2.5" stroke="rgba(248,113,113,0.7)" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M10 5l3 2.5L10 10M13 7.5H6" stroke="rgba(248,113,113,0.7)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span style="font-size:13px;font-weight:600;color:rgba(248,113,113,0.8);">Sign Out</span>
    </div>

    <div style="height:6px;"></div>

  </div>

  <!-- Tab bar — Profile active (coral) -->
  <div class="tabbar">
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M3 10.5L11 3l8 7.5V19a1 1 0 01-1 1H4a1 1 0 01-1-1v-8.5z" stroke="currentColor" stroke-width="1.6" fill="currentColor" fill-opacity="0.1" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M8 20v-6h6v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="10" cy="10" r="6.5" stroke="currentColor" stroke-width="1.6"/>
        <path d="M15 15l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="3" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <path d="M3 9h16M7 3v4M15 3v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <rect x="7" y="13" width="2" height="2" rx="0.5" fill="currentColor"/>
        <rect x="10.5" y="13" width="2" height="2" rx="0.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="tab tab--on">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="8" r="3.5" stroke="currentColor" stroke-width="1.6"/>
        <path d="M4 19c0-3.866 3.134-7 7-7h0c3.866 0 7 3.134 7 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <div class="tab-dot"></div>
    </div>
  </div>

</div>
</body>
</html>
