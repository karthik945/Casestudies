<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S12 — My Appointments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #08081a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .phone {
      width: 340px; height: 736px;
      border-radius: 36px; position: relative; overflow: hidden;
      background: #0d0d1f;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12),
        0 0 0 2.5px rgba(0,0,0,0.8),
        0 48px 96px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .notch {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 90px; height: 24px; background: #000;
      border-radius: 0 0 16px 16px; z-index: 20;
    }
    .status {
      position: absolute; top: 0; left: 0; right: 0; height: 44px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 0; z-index: 10;
    }
    .status-time { font-family: 'Space Grotesk',sans-serif; font-size: 13px; font-weight: 600; color: #fff; }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .battery {
      width: 22px; height: 10px;
      border: 1.5px solid rgba(255,255,255,0.45); border-radius: 2.5px;
      padding: 1.5px; position: relative; display: flex; align-items: center;
    }
    .battery::after {
      content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
      width: 2.5px; height: 5px; background: rgba(255,255,255,0.45);
      border-radius: 0 1.5px 1.5px 0;
    }
    .battery-fill { width: 65%; height: 100%; background: #3DD68C; border-radius: 1px; }
    .body {
      position: absolute;
      top: 44px; left: 0; right: 0; bottom: 72px;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none;
      padding: 0 18px;
    }
    .body::-webkit-scrollbar { display: none; }
    .tabbar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 72px;
      background: rgba(8,10,24,0.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 8px 12px; z-index: 20;
    }
    .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; color: rgba(255,255,255,0.28); padding: 6px 12px; border-radius: 12px; }
    .tab--on { color: #5B8FFF; background: rgba(91,143,255,0.12); border-radius: 14px; padding: 6px 16px; }
    .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.8; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<script>
if(window!==window.top){
  document.addEventListener('DOMContentLoaded',function(){
    // Body: transparent, block layout, no centering
    document.body.style.cssText='background:transparent;display:block;margin:0;padding:0;min-height:100vh;';
    // Phone div: fill entire iframe, strip frame styling
    var p=document.querySelector('.phone');
    if(p){
      p.style.cssText='width:100%;height:100vh;border-radius:0;border:none;box-shadow:none;margin:0;overflow-y:auto;overflow-x:hidden;';
    }
  });
}
</script>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <!-- Status bar -->
  <div class="status">
    <div class="status-time">10:02</div>
    <div class="status-icons">
      <svg width="30" height="10" viewBox="0 0 30 10" fill="none">
        <rect x="0" y="6" width="2.5" height="4" rx="0.4" fill="rgba(255,255,255,0.75)"/>
        <rect x="3.8" y="3.5" width="2.5" height="6.5" rx="0.4" fill="rgba(255,255,255,0.75)"/>
        <rect x="7.6" y="1.5" width="2.5" height="8.5" rx="0.4" fill="rgba(255,255,255,0.55)"/>
        <rect x="11.4" y="0" width="2.5" height="10" rx="0.4" fill="rgba(255,255,255,0.38)"/>
        <circle cx="23" cy="9" r="1.2" fill="rgba(255,255,255,0.7)"/>
        <path d="M20.2 6.5a3.8 3.8 0 015.6 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>

      <div class="battery"><div class="battery-fill"></div></div>
    </div>
  </div>

  <div class="body">

    <!-- ① Header -->
    <div style="padding:16px 0 14px;">
      <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.4px;">Appointments</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:3px;">Manage your upcoming & past visits</div>
    </div>

    <!-- ② Upcoming / Past tabs -->
    <div style="display:flex;gap:0;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:3px;margin-bottom:18px;">
      <!-- Upcoming active -->
      <div style="flex:1;padding:9px;background:rgba(91,143,255,0.15);border:1px solid rgba(91,143,255,0.3);border-radius:9px;text-align:center;font-size:13px;font-weight:600;color:rgba(140,180,255,0.95);">Upcoming</div>
      <div style="flex:1;padding:9px;text-align:center;font-size:13px;color:rgba(255,255,255,0.35);">Past</div>
    </div>

    <!-- ③ Upcoming appointment — Dr. Mitchell (Today) -->
    <div style="background:linear-gradient(135deg,rgba(91,143,255,0.1),rgba(91,143,255,0.05));border:1px solid rgba(91,143,255,0.22);border-radius:18px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(91,143,255,0.12),transparent 65%);border-radius:50%;pointer-events:none;"></div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:10px;font-weight:600;color:rgba(110,163,255,0.7);text-transform:uppercase;letter-spacing:0.08em;">Today</div>
        <div style="padding:3px 9px;background:rgba(61,214,140,0.12);border:1px solid rgba(61,214,140,0.28);border-radius:100px;font-size:10px;font-weight:600;color:rgba(61,214,140,0.9);">Confirmed</div>
      </div>

      <div style="display:flex;align-items:center;gap:11px;margin-bottom:12px;">
        <div style="width:46px;height:46px;border-radius:13px;overflow:hidden;flex-shrink:0;border:1.5px solid rgba(91,143,255,0.25);">
          <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=200&h=200&fit=crop&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" />
        </div>
        <div style="flex:1;">
          <div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#fff;">Dr. James Mitchell</div>

        </div>
      </div>

      <div style="display:flex;gap:6px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:4px;padding:4px 9px;background:rgba(255,255,255,0.07);border-radius:100px;font-size:10px;color:rgba(255,255,255,0.55);">
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><rect x="0.5" y="0.5" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1"/><path d="M0.5 3h8M2.5 0.5v1.5M6.5 0.5v1.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
          Wed, 20 Mar
        </div>
        <div style="display:flex;align-items:center;gap:4px;padding:4px 9px;background:rgba(255,255,255,0.07);border-radius:100px;font-size:10px;color:rgba(255,255,255,0.55);">
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><circle cx="4.5" cy="4.5" r="4" stroke="currentColor" stroke-width="1"/><path d="M4.5 2.5v2.2l1.3 1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
          2:00 PM
        </div>
        <div style="display:flex;align-items:center;gap:4px;padding:4px 9px;background:rgba(255,255,255,0.07);border-radius:100px;font-size:10px;color:rgba(255,255,255,0.55);">
          In-Person
        </div>
      </div>

      <div style="display:flex;gap:8px;">
        <div style="flex:1;padding:9px;background:rgba(91,143,255,0.15);border:1px solid rgba(91,143,255,0.3);border-radius:10px;text-align:center;font-size:12px;font-weight:600;color:rgba(140,180,255,0.9);">View Details</div>
        <div style="flex:1;padding:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:10px;text-align:center;font-size:12px;color:rgba(255,255,255,0.45);">Reschedule</div>
      </div>
    </div>

    <!-- ④ Upcoming — Dr. Reyes (next week) -->
    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:13px;margin-bottom:18px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:10px;font-weight:500;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:0.06em;">Next Week</div>
        <div style="padding:3px 9px;background:rgba(91,143,255,0.1);border:1px solid rgba(91,143,255,0.22);border-radius:100px;font-size:10px;font-weight:500;color:rgba(110,163,255,0.8);">Scheduled</div>
      </div>
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:10px;">
        <div style="width:42px;height:42px;border-radius:12px;overflow:hidden;flex-shrink:0;">
          <img src="https://images.unsplash.com/photo-1594824476967-48c8b964273f?w=200&h=200&fit=crop&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" />
        </div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:600;color:#fff;">Dr. Sophia Reyes</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.38);margin-top:1px;">Dermatologist · Mount Sinai</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;">
        <div style="display:flex;align-items:center;gap:4px;padding:4px 9px;background:rgba(255,255,255,0.06);border-radius:100px;font-size:10px;color:rgba(255,255,255,0.45);">
          Tue, 28 Mar
        </div>
        <div style="display:flex;align-items:center;gap:4px;padding:4px 9px;background:rgba(255,255,255,0.06);border-radius:100px;font-size:10px;color:rgba(255,255,255,0.45);">
          11:00 AM
        </div>
        <div style="display:flex;align-items:center;gap:4px;padding:4px 9px;background:rgba(255,255,255,0.06);border-radius:100px;font-size:10px;color:rgba(255,255,255,0.45);">
          Video Call
        </div>
      </div>
    </div>

    <div style="height:8px;"></div>

  </div>

  <!-- Tab bar — Calendar active (amber) -->
  <div class="tabbar">
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M3 10.5L11 3l8 7.5V19a1 1 0 01-1 1H4a1 1 0 01-1-1v-8.5z" stroke="currentColor" stroke-width="1.6" fill="currentColor" fill-opacity="0.1" stroke-linecap="round" stroke-linejoin="round"/>

      </svg>
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="10" cy="10" r="6.5" stroke="currentColor" stroke-width="1.6"/>

    <div class="tab tab--on">

        <rect x="10.5" y="13" width="2" height="2" rx="0.5" fill="currentColor"/>

      <div class="tab-dot"></div>
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="8" r="3.5" stroke="currentColor" stroke-width="1.6"/>
        <path d="M4 19c0-3.866 3.134-7 7-7h0c3.866 0 7 3.134 7 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

</div>
<script>
(function(){
  function go(screen){
    if(window.parent!==window)
      window.parent.postMessage({navigate:screen},"*");
    else
      window.location.href=screen;
  }
  function wire(el,screen){
    if(el&&screen){
      el.style.cursor="pointer";
      el.addEventListener("click",function(e){e.stopPropagation();go(screen);});
    }
  }
  document.addEventListener("DOMContentLoaded",function(){
    wire(document.querySelector(".btn-primary,.sticky-cta"),"s14_detail.html");
    // Make inputs focusable
    document.querySelectorAll("input,textarea").forEach(function(el){
      el.removeAttribute("readonly");el.removeAttribute("disabled");
    });
  });
})();
</script>
</body>
</html>
