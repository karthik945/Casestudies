<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S02 — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #08081a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .phone {
      width: 340px;
      height: 736px;
      border-radius: 36px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(160deg, #0d1535 0%, #0d0d1f 50%, #130d2a 100%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12),
        0 0 0 2.5px rgba(0,0,0,0.8),
        0 48px 96px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .notch {
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 90px; height: 24px;
      background: #000;
      border-radius: 0 0 16px 16px;
      z-index: 20;
    }
    .status {
      position: absolute;
      top: 0; left: 0; right: 0; height: 44px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 0;
      z-index: 10;
    }
    .status-time {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 600; color: #fff;
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .battery {
      width: 22px; height: 10px;
      border: 1.5px solid rgba(255,255,255,0.45);
      border-radius: 2.5px; padding: 1.5px;
      position: relative; display: flex; align-items: center;
    }
    .battery::after {
      content: '';
      position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
      width: 2.5px; height: 5px;
      background: rgba(255,255,255,0.45);
      border-radius: 0 1.5px 1.5px 0;
    }
    .battery-fill { width: 65%; height: 100%; background: #3DD68C; border-radius: 1px; }

    .content {
      position: absolute;
      top: 44px; left: 0; right: 0; bottom: 0;
      padding: 24px 24px 32px;
      display: flex; flex-direction: column; gap: 20px;
      overflow: hidden;
    }

    /* Header */
    .screen-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px; font-weight: 700;
      letter-spacing: -0.5px; color: #fff;
      line-height: 1.2;
    }
    .screen-sub {
      font-size: 13px; color: rgba(255,255,255,0.4);
      margin-top: 5px; line-height: 1.5;
    }

    /* Form */
    .form { display: flex; flex-direction: column; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field-label {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .field-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .field-input--active {
      border-color: rgba(91,143,255,0.5);
      background: rgba(91,143,255,0.06);
    }
    .field-value {
      font-size: 13px; color: rgba(255,255,255,0.75);
    }
    .field-placeholder {
      font-size: 13px; color: rgba(255,255,255,0.25);
    }
    .field-icon { color: rgba(255,255,255,0.25); }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 10px;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
    .divider-text { font-size: 11px; color: rgba(255,255,255,0.25); }

    /* Buttons */
    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #5B8FFF 0%, #7B6FFF 100%);
      border-radius: 14px;
      font-size: 14px; font-weight: 600; color: #fff;
      text-align: center;
      box-shadow: 0 8px 24px rgba(91,143,255,0.3);
    }
    .btn-google {
      width: 100%; padding: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      font-size: 13px; color: rgba(255,255,255,0.65);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .signin-note {
      text-align: center;
      font-size: 12px; color: rgba(255,255,255,0.28);
    }
    .signin-note span { color: rgba(110,163,255,0.8); font-weight: 500; }

    /* Progress dots */
    .progress-dots {
      display: flex; gap: 6px; justify-content: center;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.12); }
    .dot--on { width: 18px; border-radius: 3px; background: #5B8FFF; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <!-- Status bar -->
  <div class="status">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg width="30" height="10" viewBox="0 0 30 10" fill="none">
        <rect x="0" y="6" width="2.5" height="4" rx="0.4" fill="rgba(255,255,255,0.75)"/>
        <rect x="3.8" y="3.5" width="2.5" height="6.5" rx="0.4" fill="rgba(255,255,255,0.75)"/>
        <rect x="7.6" y="1.5" width="2.5" height="8.5" rx="0.4" fill="rgba(255,255,255,0.55)"/>
        <rect x="11.4" y="0" width="2.5" height="10" rx="0.4" fill="rgba(255,255,255,0.38)"/>
        <circle cx="23" cy="9" r="1.2" fill="rgba(255,255,255,0.7)"/>
        <path d="M20.2 6.5a3.8 3.8 0 015.6 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M17.8 4a7.2 7.2 0 0110.4 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div class="battery"><div class="battery-fill"></div></div>
    </div>
  </div>

  <div class="content">

    <!-- Header -->
    <div>
      <div class="screen-title">Create account</div>
      <div class="screen-sub">Join 50,000+ patients on PulseCare</div>
    </div>

    <!-- Form -->
    <div class="form">

      <div class="field">
        <div class="field-label">Full Name</div>
        <div class="field-input field-input--active">
          <span class="field-value">Emily Carter</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="5.5" r="2.5" stroke="rgba(91,143,255,0.7)" stroke-width="1.4"/>
            <path d="M2 12c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="rgba(91,143,255,0.7)" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <div class="field-label">Email Address</div>
        <div class="field-input">
          <span class="field-value">emily@example.com</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="1.5" y="3" width="11" height="8" rx="1.5" stroke="rgba(255,255,255,0.25)" stroke-width="1.4"/>
            <path d="M1.5 5l5.5 3.5L12.5 5" stroke="rgba(255,255,255,0.25)" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <div class="field-label">Password</div>
        <div class="field-input">
          <span class="field-value" style="letter-spacing:3px;font-size:11px;">••••••••••</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7s2-4 5-4 5 4 5 4-2 4-5 4-5-4-5-4z" stroke="rgba(255,255,255,0.25)" stroke-width="1.4"/>
            <circle cx="7" cy="7" r="1.5" fill="rgba(255,255,255,0.25)"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <div class="field-label">Date of Birth</div>
        <div class="field-input">
          <span class="field-value">March 14, 1994</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="1.5" y="2.5" width="11" height="10" rx="1.5" stroke="rgba(255,255,255,0.25)" stroke-width="1.4"/>
            <path d="M1.5 6h11M4.5 1v3M9.5 1v3" stroke="rgba(255,255,255,0.25)" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

    </div>

    <!-- Terms note -->
    <div style="display:flex;align-items:flex-start;gap:8px;">
      <div style="width:16px;height:16px;border-radius:4px;background:rgba(91,143,255,0.2);border:1px solid rgba(91,143,255,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
          <path d="M1.5 4.5l2 2 4-4" stroke="#5B8FFF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div style="font-size:11px;color:rgba(255,255,255,0.3);line-height:1.5;">
        I agree to the <span style="color:rgba(110,163,255,0.7);">Terms of Service</span> and <span style="color:rgba(110,163,255,0.7);">Privacy Policy</span>
      </div>
    </div>

    <!-- Primary CTA -->
    <div class="btn-primary">Create Account</div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or</div>
      <div class="divider-line"></div>
    </div>

    <!-- Google button -->
    <div class="btn-google">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M14.5 8.16c0-.52-.04-1.02-.13-1.5H8v2.84h3.64a3.1 3.1 0 01-1.35 2.04v1.7h2.18c1.28-1.18 2.03-2.92 2.03-5.08z" fill="rgba(66,133,244,0.8)"/>
        <path d="M8 15c1.83 0 3.36-.6 4.47-1.64l-2.18-1.7c-.6.41-1.38.65-2.29.65-1.76 0-3.25-1.19-3.78-2.78H1.97v1.74C3.07 13.6 5.38 15 8 15z" fill="rgba(52,168,83,0.8)"/>
        <path d="M4.22 9.53A4.24 4.24 0 014 8c0-.53.09-1.04.22-1.53V4.73H1.97A7.02 7.02 0 001 8c0 1.13.27 2.2.97 3.27l2.25-1.74z" fill="rgba(251,188,4,0.8)"/>
        <path d="M8 3.69c.99 0 1.88.34 2.58 1.01l1.93-1.93C11.36 1.73 9.83 1 8 1 5.38 1 3.07 2.4 1.97 4.73L4.22 6.47C4.75 4.88 6.24 3.69 8 3.69z" fill="rgba(234,67,53,0.8)"/>
      </svg>
      Continue with Google
    </div>

    <div class="signin-note">Already have an account? <span>Sign in</span></div>

  </div>
</div>
<script>
(function(){
  function go(screen){
    if(window.parent!==window)
      window.parent.postMessage({navigate:screen},"*");
    else
      window.location.href=screen;
  }
  function wire(el,screen){
    if(el&&screen){
      el.style.cursor="pointer";
      el.addEventListener("click",function(e){e.stopPropagation();go(screen);});
    }
  }
  document.addEventListener("DOMContentLoaded",function(){
    wire(document.querySelector(".btn-primary,.sticky-cta"),"s04_home_empty.html");
    var si=document.querySelector(".signin-link span"); wire(si,"s03_login.html");
    wire(document.querySelector(".btn-google"),"s04_home_empty.html");
    // Make inputs focusable
    document.querySelectorAll("input,textarea").forEach(function(el){
      el.removeAttribute("readonly");el.removeAttribute("disabled");
    });
  });
})();
</script>
</body>
</html>
