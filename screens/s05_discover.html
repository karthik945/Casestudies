<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S05 — Find a Doctor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #08081a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .phone {
      width: 340px; height: 736px;
      border-radius: 36px; position: relative; overflow: hidden;
      background: #0d0d1f;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12),
        0 0 0 2.5px rgba(0,0,0,0.8),
        0 48px 96px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .notch {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 90px; height: 24px; background: #000;
      border-radius: 0 0 16px 16px; z-index: 20;
    }
    .status {
      position: absolute; top: 0; left: 0; right: 0; height: 44px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 0; z-index: 10;
    }
    .status-time { font-family: 'Space Grotesk',sans-serif; font-size: 13px; font-weight: 600; color: #fff; }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .battery {
      width: 22px; height: 10px;
      border: 1.5px solid rgba(255,255,255,0.45); border-radius: 2.5px;
      padding: 1.5px; position: relative; display: flex; align-items: center;
    }
    .battery::after {
      content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
      width: 2.5px; height: 5px; background: rgba(255,255,255,0.45);
      border-radius: 0 1.5px 1.5px 0;
    }
    .battery-fill { width: 65%; height: 100%; background: #3DD68C; border-radius: 1px; }
    .body {
      position: absolute; top: 44px; left: 0; right: 0; bottom: 72px;
      padding: 20px 18px 0;
      display: flex; flex-direction: column; gap: 20px;
      overflow: hidden;
    }
    .tabbar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 72px;
      background: rgba(8,10,24,0.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 8px 12px; z-index: 20;
    }
    .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; color: rgba(255,255,255,0.28); padding: 6px 12px; border-radius: 12px; }
    .tab--on { color: #5B8FFF; }
    .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.8; }
  </style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <!-- Status bar -->
  <div class="status">
    <div class="status-time">9:43</div>
    <div class="status-icons">
      <svg width="30" height="10" viewBox="0 0 30 10" fill="none">
        <rect x="0" y="6" width="2.5" height="4" rx="0.4" fill="rgba(255,255,255,0.75)"/>
        <rect x="3.8" y="3.5" width="2.5" height="6.5" rx="0.4" fill="rgba(255,255,255,0.75)"/>
        <rect x="7.6" y="1.5" width="2.5" height="8.5" rx="0.4" fill="rgba(255,255,255,0.55)"/>
        <rect x="11.4" y="0" width="2.5" height="10" rx="0.4" fill="rgba(255,255,255,0.38)"/>
        <circle cx="23" cy="9" r="1.2" fill="rgba(255,255,255,0.7)"/>
        <path d="M20.2 6.5a3.8 3.8 0 015.6 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M17.8 4a7.2 7.2 0 0110.4 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div class="battery"><div class="battery-fill"></div></div>
    </div>
  </div>

  <div class="body">

    <!-- ① Header — clear intent, no premature result count -->
    <div>
      <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.4px;">Find a Doctor</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.38);margin-top:4px;">Search by specialty, doctor, or condition</div>
    </div>

    <!-- ② Search bar — dominant primary action -->
    <div>
      <!-- Search input — visually large, glowing border to draw attention -->
      <div style="display:flex;align-items:center;gap:10px;background:rgba(91,143,255,0.07);border:1.5px solid rgba(91,143,255,0.45);border-radius:16px;padding:14px 16px;box-shadow:0 0 0 4px rgba(91,143,255,0.06);">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="8" cy="8" r="5.5" stroke="rgba(91,143,255,0.85)" stroke-width="1.6"/>
          <path d="M12.5 12.5l3.5 3.5" stroke="rgba(91,143,255,0.85)" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span style="font-size:14px;color:rgba(255,255,255,0.32);flex:1;">Search doctors, conditions...</span>
        <!-- Mic icon -->
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <rect x="5" y="1" width="5" height="8" rx="2.5" stroke="rgba(91,143,255,0.5)" stroke-width="1.4"/>
          <path d="M2.5 8a5 5 0 0010 0" stroke="rgba(91,143,255,0.5)" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M7.5 13v-2" stroke="rgba(91,143,255,0.5)" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Location pill below search — single useful filter on pre-search state -->
      <div style="display:flex;align-items:center;gap:6px;margin-top:10px;">
        <div style="display:flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(61,214,140,0.08);border:1px solid rgba(61,214,140,0.2);border-radius:100px;">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M5 1a2.5 2.5 0 012.5 2.5C7.5 5.5 5 9 5 9S2.5 5.5 2.5 3.5A2.5 2.5 0 015 1z" stroke="#3DD68C" stroke-width="1.1"/>
            <circle cx="5" cy="3.5" r="1" fill="#3DD68C" opacity="0.7"/>
          </svg>
          <span style="font-size:11px;color:rgba(61,214,140,0.8);">Home: New York, NY</span>
        </div>
      </div>
    </div>

    <!-- ③ Recent searches — conditional, with Clear all -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:0.08em;">Recent Searches</div>
        <div style="font-size:11px;color:rgba(91,143,255,0.7);">Clear all</div>
      </div>
      <div style="display:flex;flex-direction:column;">
        <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="5" stroke="rgba(255,255,255,0.2)" stroke-width="1.3"/>
            <path d="M7 4.5v3l1.5 1.5" stroke="rgba(255,255,255,0.2)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span style="font-size:13px;color:rgba(255,255,255,0.55);flex:1;">Cardiologist near me</span>
          <!-- X to remove this item -->
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M3 3l6 6M9 3l-6 6" stroke="rgba(255,255,255,0.18)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:9px 0;">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="5" stroke="rgba(255,255,255,0.2)" stroke-width="1.3"/>
            <path d="M7 4.5v3l1.5 1.5" stroke="rgba(255,255,255,0.2)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span style="font-size:13px;color:rgba(255,255,255,0.55);flex:1;">Dr. Sophia Reyes</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M3 3l6 6M9 3l-6 6" stroke="rgba(255,255,255,0.18)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- ④ Browse by specialty — secondary entry point, clearly labelled as alternative -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.08em;">Or browse by specialty</div>
        <div style="font-size:11px;color:rgba(91,143,255,0.7);">See all</div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">

        <!-- Cardiology: heart -->
        <div style="background:rgba(91,143,255,0.08);border:1px solid rgba(91,143,255,0.18);border-radius:14px;padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 20.5S4 14.5 4 8.5A5 5 0 0112 5.5a5 5 0 018 3C20 14.5 12 20.5 12 20.5z" stroke="#5B8FFF" stroke-width="1.5" fill="rgba(91,143,255,0.15)" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div style="font-size:10px;font-weight:500;color:rgba(110,163,255,0.85);text-align:center;">Cardiology</div>
        </div>

        <!-- Neurology: connected nodes -->
        <div style="background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.18);border-radius:14px;padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="#A78BFA" stroke-width="1.5"/>
            <circle cx="5.5" cy="7" r="1.8" stroke="#A78BFA" stroke-width="1.3" opacity="0.65"/>
            <circle cx="18.5" cy="7" r="1.8" stroke="#A78BFA" stroke-width="1.3" opacity="0.65"/>
            <circle cx="5.5" cy="17" r="1.8" stroke="#A78BFA" stroke-width="1.3" opacity="0.65"/>
            <circle cx="18.5" cy="17" r="1.8" stroke="#A78BFA" stroke-width="1.3" opacity="0.65"/>
            <path d="M9 10.3l-2-2M15 10.3l2-2M9 13.7l-2 2M15 13.7l2 2" stroke="#A78BFA" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
          </svg>
          <div style="font-size:10px;font-weight:500;color:rgba(167,139,250,0.85);text-align:center;">Neurology</div>
        </div>

        <!-- Dermatology: circles/skin -->
        <div style="background:rgba(61,214,140,0.08);border:1px solid rgba(61,214,140,0.18);border-radius:14px;padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="7" stroke="#3DD68C" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3.5" stroke="#3DD68C" stroke-width="1.3" opacity="0.5"/>
            <circle cx="12" cy="12" r="1" fill="#3DD68C" opacity="0.7"/>
          </svg>
          <div style="font-size:10px;font-weight:500;color:rgba(61,214,140,0.85);text-align:center;">Dermatology</div>
        </div>

        <!-- GP: stethoscope -->
        <div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.18);border-radius:14px;padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M8 5v5a4 4 0 008 0V5" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="8" cy="5" r="1.3" fill="#F59E0B"/>
            <circle cx="16" cy="5" r="1.3" fill="#F59E0B"/>
            <path d="M16 10c0 2.5 2 4.5 4 4.5" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="20" cy="15.5" r="2" stroke="#F59E0B" stroke-width="1.3"/>
          </svg>
          <div style="font-size:10px;font-weight:500;color:rgba(245,158,11,0.85);text-align:center;">General GP</div>
        </div>

        <!-- Pediatrics: smiley face -->
        <div style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.18);border-radius:14px;padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="7.5" stroke="#F87171" stroke-width="1.5"/>
            <circle cx="9.5" cy="10.5" r="1.2" fill="#F87171" opacity="0.8"/>
            <circle cx="14.5" cy="10.5" r="1.2" fill="#F87171" opacity="0.8"/>
            <path d="M9 14c.7 1.2 2 2 3 2s2.3-.8 3-2" stroke="#F87171" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <div style="font-size:10px;font-weight:500;color:rgba(248,113,113,0.85);text-align:center;">Pediatrics</div>
        </div>

        <!-- Eye Care -->
        <div style="background:rgba(99,210,240,0.08);border:1px solid rgba(99,210,240,0.18);border-radius:14px;padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M3 12s3.5-7 9-7 9 7 9 7-3.5 7-9 7-9-7-9-7z" stroke="#63D2F0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="#63D2F0" stroke-width="1.5"/>
            <circle cx="13.5" cy="10.8" r="1" fill="#63D2F0" opacity="0.65"/>
          </svg>
          <div style="font-size:10px;font-weight:500;color:rgba(99,210,240,0.85);text-align:center;">Eye Care</div>
        </div>

      </div>
    </div>

  </div>

  <!-- Tab bar — Search tab more visually dominant -->
  <div class="tabbar">
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M3 10.5L11 3l8 7.5V19a1 1 0 01-1 1H4a1 1 0 01-1-1v-8.5z" stroke="currentColor" stroke-width="1.6" fill="currentColor" fill-opacity="0.1" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M8 20v-6h6v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <!-- Search tab: pill background to emphasize active state -->
    <div class="tab tab--on" style="background:rgba(91,143,255,0.12);border-radius:14px;padding:6px 16px;">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="10" cy="10" r="6.5" stroke="currentColor" stroke-width="1.8"/>
        <path d="M15 15l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <div class="tab-dot"></div>
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="3" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/>
        <path d="M3 9h16M7 3v4M15 3v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <rect x="7" y="13" width="2" height="2" rx="0.5" fill="currentColor"/>
        <rect x="10.5" y="13" width="2" height="2" rx="0.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="8" r="3.5" stroke="currentColor" stroke-width="1.6"/>
        <path d="M4 19c0-3.866 3.134-7 7-7h0c3.866 0 7 3.134 7 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

</div>
</body>
</html>
